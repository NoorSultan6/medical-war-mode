<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical War Mode</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

body{
margin:0;
overflow-x:hidden;
background:#020617;
color:white;
font-family:sans-serif;
}

#bg{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.glass{
background:rgba(30,41,59,0.6);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
}

.btn{
background:#ef4444;
padding:14px 40px;
border-radius:14px;
font-weight:bold;
box-shadow:0 10px 40px rgba(255,0,0,0.5);
transition:0.3s;
border:none;
color:white;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 20px 60px rgba(255,0,0,0.7);
}

textarea{
width:100%;
height:150px;
background:#0f172a;
border:1px solid #334155;
border-radius:10px;
padding:15px;
color:white;
margin-top:15px;
}

.container{
max-width:900px;
margin:auto;
text-align:center;
margin-top:120px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<h1 style="font-size:60px;color:#ef4444;margin-bottom:10px;">
🧠 Medical War Mode
</h1>

<p style="color:#9ca3af;margin-bottom:40px;">
Upload lectures • Extract high yield • Generate exam questions
</p>

<div class="glass">

<textarea placeholder="Paste your medical lecture here..."></textarea>

<br><br>

<button class="btn">
Analyze
</button>

</div>

</div>


<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#bg")
});

renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z = 6;

const geometry = new THREE.TorusGeometry(3,1,16,100);

const material = new THREE.MeshStandardMaterial({
color:0xff0000
});

const torus = new THREE.Mesh(geometry,material);

scene.add(torus);

const pointLight = new THREE.PointLight(0xffffff);

pointLight.position.set(5,5,5);

scene.add(pointLight);

function animate(){

requestAnimationFrame(animate);

torus.rotation.x +=0.01;
torus.rotation.y +=0.01;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
