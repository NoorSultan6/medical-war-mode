<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical War Mode</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0b1120;
font-family:sans-serif;
color:white;
}

.card{
background:#111827;
border:1px solid #1f2937;
}

</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="max-w-2xl w-full text-center">

<h1 class="text-4xl font-bold text-blue-400 mb-3">
🧠 Medical War Mode
</h1>

<p class="text-gray-400 mb-8">
Upload lectures • Extract high yield • Generate exam questions
</p>

<div class="card rounded-xl p-6">

<textarea
class="w-full h-40 bg-slate-900 border border-slate-700 rounded-lg p-4"
placeholder="Paste your medical lecture here..."
></textarea>

<button
class="mt-5 px-8 py-3 bg-blue-500 rounded-lg hover:bg-blue-600 transition"
>
Analyze
</button>

</div>

<div class="card rounded-xl p-6 mt-6 text-left">
Result will appear here...
</div>

</div>

</body>
</html>
