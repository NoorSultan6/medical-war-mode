<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Medical War Mode</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

body{
background:#0b1120;
color:white;
font-family:sans-serif;
margin:0;
overflow-x:hidden;
}

canvas{
position:absolute;
left:0;
top:0;
z-index:-1;
}

.glass{
background:rgba(30,41,59,0.6);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
}

</style>

</head>

<body>


<div class="max-w-6xl mx-auto pt-20 grid md:grid-cols-2 gap-10 items-center">

<!-- 3D brain area -->

<div id="brain3d"></div>


<!-- app -->

<div>

<h1 class="text-5xl font-bold text-blue-400 mb-4">
🧠 Medical War Mode
</h1>

<p class="text-gray-400 mb-6">
Upload lectures • Extract high yield • Generate exam questions
</p>


<div class="glass p-6 rounded-xl">

<textarea
class="w-full h-36 bg-slate-900 border border-slate-700 rounded-lg p-4"
placeholder="Paste your medical lecture here..."
></textarea>

<button
class="mt-5 px-8 py-3 bg-blue-500 rounded-lg hover:bg-blue-600 transition"
>
Analyze
</button>

</div>

<div class="glass p-6 rounded-xl mt-6">
Result will appear here...
</div>

</div>

</div>



<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/2/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth/2,window.innerHeight);

document.getElementById("brain3d").appendChild(renderer.domElement);


const geometry = new THREE.SphereGeometry(2,64,64);

const material = new THREE.MeshStandardMaterial({
color:0x60a5fa,
wireframe:true
});

const brain = new THREE.Mesh(geometry,material);

scene.add(brain);

const light = new THREE.PointLight(0xffffff,1);

light.position.set(5,5,5);

scene.add(light);

camera.position.z = 5;

function animate(){

requestAnimationFrame(animate);

brain.rotation.y += 0.01;

renderer.render(scene,camera);

}

animate();

</script>


</body>
</html>
