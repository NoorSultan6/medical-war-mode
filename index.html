<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical War Mode</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#0b1220;
color:white;
font-family:sans-serif;
}

.glow{
box-shadow:0 0 30px rgba(59,130,246,0.3);
}
</style>
</head>

<body>

<div class="max-w-6xl mx-auto p-8">

<h1 class="text-4xl font-bold text-blue-400 mb-2">
🧠 Medical War Mode
</h1>

<p class="text-gray-400 mb-10">
AI Medical Study Platform — Upload lectures and extract exam knowledge
</p>

<div class="grid md:grid-cols-2 gap-10">

<div>

<div class="bg-slate-900 p-6 rounded-xl glow">

<h2 class="text-xl mb-4 text-blue-300">
Paste Lecture
</h2>

<textarea
id="lectureInput"
class="w-full h-40 p-3 bg-slate-800 rounded-lg"
placeholder="Paste medical lecture text..."
></textarea>

</div>

<button
onclick="analyzeLecture()"
class="mt-6 bg-blue-500 px-6 py-3 rounded-lg hover:bg-blue-600"
>
Analyze
</button>

</div>

<div>

<div class="bg-slate-900 p-6 rounded-xl mb-6">
<h3 class="text-lg text-yellow-400 mb-2">
⚡ High Yield Points
</h3>
<div id="highYield">
Results will appear here
</div>
</div>

<div class="bg-slate-900 p-6 rounded-xl mb-6">
<h3 class="text-lg text-green-400 mb-2">
📚 MCQ Questions
</h3>
<div id="mcq">
Results will appear here
</div>
</div>

<div class="bg-slate-900 p-6 rounded-xl">
<h3 class="text-lg text-blue-400 mb-2">
🧠 Explanation
</h3>
<div id="explanation">
Results will appear here
</div>
</div>

</div>

</div>

</div>

<script>

async function analyzeLecture(){

const lecture = document.getElementById("lectureInput").value

if(!lecture){
alert("Paste lecture first")
return
}

const API_KEY = "AIzaSyAVBylAA1N4IhA86g4vm9rRnfF04YorBwA"

const prompt = `
You are a medical exam preparation assistant.

From this lecture extract:

1. High yield exam points
2. 5 MCQ questions
3. Simple explanation

Lecture:
${lecture}
`

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:prompt}
]
}
]
})
}
)

const data = await response.json()

const result =
data?.candidates?.[0]?.content?.parts?.[0]?.text
|| "AI did not return response"

document.getElementById("highYield").innerText = result
document.getElementById("mcq").innerText = result
document.getElementById("explanation").innerText = result

}catch(error){

document.getElementById("highYield").innerText =
"Error connecting to AI"

}

}

</script>

</body>
</html>
