<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical War Mode</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

body{
margin:0;
background:#0b1120;
color:white;
font-family:sans-serif;
}

.container{
max-width:1100px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding-top:100px;
}

#brain{
width:450px;
height:450px;
}

.panel{
width:500px;
background:rgba(30,41,59,0.6);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
}

textarea{
width:100%;
height:140px;
background:#0f172a;
border:1px solid #334155;
border-radius:10px;
padding:15px;
color:white;
}

button{
margin-top:20px;
background:#3b82f6;
padding:12px 30px;
border-radius:10px;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
border-radius:15px;
background:rgba(30,41,59,0.6);
border:1px solid rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<div class="container">

<div id="brain"></div>

<div>

<h1 style="font-size:45px;color:#60a5fa;">
🧠 Medical War Mode
</h1>

<p style="color:#9ca3af;margin-bottom:20px;">
Upload lectures • Extract high yield • Generate exam questions
</p>

<div class="panel">

<textarea placeholder="Paste your medical lecture here..."></textarea>

<button>
Analyze
</button>

</div>

<div class="result">
Result will appear here...
</div>

</div>

</div>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
450/450,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(450,450);

document.getElementById("brain").appendChild(renderer.domElement);

const geometry = new THREE.IcosahedronGeometry(2,1);

const material = new THREE.MeshStandardMaterial({
color:0x60a5fa,
wireframe:true
});

const brain = new THREE.Mesh(geometry,material);

scene.add(brain);

const light = new THREE.PointLight(0xffffff,1);

light.position.set(5,5,5);

scene.add(light);

camera.position.z = 5;

function animate(){

requestAnimationFrame(animate);

brain.rotation.y +=0.01;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
