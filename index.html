<!DOCTYPE html>
<html>
<head>
<title>Medical War Mode</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-10">

<h1 class="text-4xl font-bold mb-6">🧠 Medical War Mode</h1>

<textarea id="lecture" class="w-full h-40 p-4 text-black rounded" placeholder="Paste lecture here"></textarea>

<button onclick="analyze()" class="mt-4 bg-blue-500 px-6 py-2 rounded">
Analyze
</button>

<div class="grid grid-cols-3 gap-6 mt-8">

<div class="bg-slate-800 p-6 rounded">
<h2 class="text-yellow-400 font-bold">High Yield</h2>
<p id="yield">Results appear here</p>
</div>

<div class="bg-slate-800 p-6 rounded">
<h2 class="text-green-400 font-bold">MCQ Questions</h2>
<p id="mcq">Results appear here</p>
</div>

<div class="bg-slate-800 p-6 rounded">
<h2 class="text-pink-400 font-bold">Explanation</h2>
<p id="exp">Results appear here</p>
</div>

</div>

<script>

async function analyze(){

const lecture = document.getElementById("lecture").value

document.getElementById("yield").innerText = "Analyzing..."
document.getElementById("mcq").innerText = "Generating..."
document.getElementById("exp").innerText = "Generating..."

const res = await fetch("/api/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
lecture:lecture
})
})

const data = await res.json()

const text = JSON.stringify(data)

document.getElementById("yield").innerText = text
document.getElementById("mcq").innerText = text
document.getElementById("exp").innerText = text

}

</script>

</body>
</html>
