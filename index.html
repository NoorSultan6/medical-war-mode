<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical War Mode</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:sans-serif;
margin:0;
}

.chat-box{
height:65vh;
overflow-y:auto;
padding:20px;
}

.user{
background:#1e293b;
margin-left:auto;
padding:15px;
border-radius:10px;
max-width:600px;
}

.ai{
background:#111827;
padding:15px;
border-radius:10px;
max-width:600px;
}

textarea{
resize:none;
}
</style>
</head>

<body class="flex flex-col h-screen">

<div style="padding:15px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center">

<h1 style="color:#60a5fa;font-weight:bold">
🧠 Medical War Mode
</h1>

<span style="color:#94a3b8">
AI Medical Study Assistant
</span>

</div>

<div id="chat" class="chat-box">

<div class="ai">
Welcome 👋<br>
Paste part of your medical lecture and I will extract high-yield exam points.
</div>

</div>

<div style="padding:15px;border-top:1px solid #334155;display:flex;gap:10px">

<textarea
id="input"
style="flex:1;background:#1e293b;border:1px solid #475569;border-radius:8px;padding:10px"
placeholder="Paste your lecture here..."
></textarea>

<button
onclick="sendMessage()"
style="background:#3b82f6;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer"
>
Analyze
</button>

</div>

<script>

function sendMessage(){

const input = document.getElementById("input");
const chat = document.getElementById("chat");

const text = input.value.trim();

if(text === "") return;

chat.innerHTML += `
<div class="user">
${text}
</div>
`;

chat.innerHTML += `
<div class="ai">
Analyzing lecture...
</div>
`;

input.value="";

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
